<main class="page">
  <section class="panel">
    <header class="panel__header">
      <h1>Agent Chat Mock</h1>
      <button class="refresh" type="button" (click)="resetChat()">
        Reset
      </button>
    </header>

    <p class="summary">{{ summary }}</p>

    <section class="chat" aria-label="Agent chat">
      @for (message of messages(); track message.id) {
        <article class="bubble" [class.bubble--assistant]="message.role === 'assistant'">
          <p class="role">{{ message.role }}</p>
          <p class="content">{{ message.content }}</p>

          @if (message.ui) {
            <div class="tools">
              <app-dynamic-renderer [schema]="message.ui" />
            </div>
          }
        </article>
      }

    </section>

    <form class="composer" (submit)="$event.preventDefault(); sendMessage()">
      <input
        class="composer__input"
        type="text"
        [value]="draft()"
        (input)="updateDraft($any($event.target).value)"
        placeholder="Type a message..."
        aria-label="Message"
      />
      <button class="composer__send" type="submit" [disabled]="isTyping() || !draft().trim()">
        Send
      </button>
    </form>
  </section>
</main>
